app = "kawahiva-corpus"
primary_region = "gru"

[build]

[processes]
  app = "gunicorn --bind 0.0.0.0:8080 -k uvicorn.workers.UvicornWorker servidor:app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = suspend
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
